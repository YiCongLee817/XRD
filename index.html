function atomicF(element, s2) {
  const el = ATOMIC_SCATTERING[element] || ATOMIC_SCATTERING["Si"];
  let f = el.c;
  for (let i = 0; i < 4; i++) f += el.a[i] * Math.exp(-el.b[i] * s2);
  return f;
}

// ══════════════════════════════════════════════════════════════════════════════
// PHYSICS FUNCTIONS
// ══════════════════════════════════════════════════════════════════════════════

function dSpacing(h, k, l, a, b, c, beta_deg, system) {
  const betaR = beta_deg * Math.PI / 180;
  const sb = Math.sin(betaR), cb = Math.cos(betaR);
  switch (system) {
    case "cubic":        { const inv=(h*h+k*k+l*l)/(a*a); return inv>0?1/Math.sqrt(inv):Infinity; }
    case "tetragonal":   { const inv=(h*h+k*k)/(a*a)+l*l/(c*c); return inv>0?1/Math.sqrt(inv):Infinity; }
    case "hexagonal":    { const inv=(4/3)*(h*h+h*k+k*k)/(a*a)+l*l/(c*c); return inv>0?1/Math.sqrt(inv):Infinity; }
    case "orthorhombic": { const inv=h*h/(a*a)+k*k/(b*b)+l*l/(c*c); return inv>0?1/Math.sqrt(inv):Infinity; }
    case "monoclinic":   { const inv=(1/(sb*sb))*(h*h/(a*a)+k*k*sb*sb/(b*b)+l*l/(c*c)-2*h*l*cb/(a*c)); return inv>0?1/Math.sqrt(inv):Infinity; }
    default: { const inv=h*h/(a*a)+k*k/(b*b)+l*l/(c*c); return inv>0?1/Math.sqrt(inv):Infinity; }
  }
}

// Full structure factor with per-atom bookkeeping
function structureFactor(h, k, l, basis, Bdw, s2) {
  let Fre = 0, Fim = 0;
  const atomContribs = [];
  for (const atom of basis) {
    const f_j   = atomicF(atom.element, s2);
    const dw_j  = Math.exp(-Bdw * s2);          // Debye-Waller
    const feff  = f_j * dw_j;
    const phi   = 2 * Math.PI * (h*atom.x + k*atom.y + l*atom.z);
    const cosP  = Math.cos(phi), sinP = Math.sin(phi);
    const re_j  = feff * cosP;
    const im_j  = feff * sinP;
    Fre += re_j; Fim += im_j;
    atomContribs.push({ element:atom.element, x:atom.x, y:atom.y, z:atom.z,
      f_j, dw_j, feff, phi_deg:phi*180/Math.PI, cosP, sinP, re_j, im_j });
  }
  return { Fre, Fim, F2: Fre*Fre+Fim*Fim, Fmod: Math.sqrt(Fre*Fre+Fim*Fim), atomContribs };
}

// LP = (1 + cos²2θ) / (sin²θ · cosθ)
function LP(twoTheta_deg) {
  const th = twoTheta_deg * Math.PI / 360;
  const st = Math.sin(th), ct = Math.cos(th);
  if (st < 1e-9 || ct < 1e-9) return 1;
  const cos2t = Math.cos(2*th);
  return (1 + cos2t*cos2t) / (st*st * ct);
}

// FWHM from Scherrer + microstrain (degrees)
function peakFWHM(twoTheta_deg, D_nm, lambda_A, eps) {
  const th  = twoTheta_deg * Math.PI / 360;
  const ct  = Math.cos(th), tt = Math.tan(th);
  const D_A = D_nm * 10;
  const bSz = (0.9 * lambda_A) / (D_A * ct) * (180/Math.PI);
  const bSt = 4 * eps * tt * (180/Math.PI);
  return Math.sqrt(bSz*bSz + bSt*bSt);
}

// ══════════════════════════════════════════════════════════════════════════════
// XRD ENGINE
// ══════════════════════════════════════════════════════════════════════════════
function simulateXRD({ structureKey, a, b, c, beta_deg, lambda, min2t, max2t, maxHKL, D, eps, Bdw, nPts }) {
  const struct = STRUCTURES[structureKey];
  const basis  = struct.getBasis();
  const system = struct.system;
  const peaks  = [];

  for (let h = -maxHKL; h <= maxHKL; h++) {
    for (let k = -maxHKL; k <= maxHKL; k++) {
      for (let l = -maxHKL; l <= maxHKL; l++) {
        if (h===0 && k===0 && l===0) continue;
        const d = dSpacing(h, k, l, a, b, c, beta_deg, system);
        if (!isFinite(d) || d <= 0) continue;
        const sinT = lambda / (2*d);
        if (sinT >= 1 || sinT <= 0) continue;
        const twoTh = 2 * Math.asin(sinT) * 180/Math.PI;
        if (twoTh < min2t || twoTh > max2t) continue;

        const s   = sinT / lambda;          // Å⁻¹
        const s2  = s * s;
        const sf  = structureFactor(h, k, l, basis, Bdw, s2);
        if (sf.F2 < 0.001) continue;       // systematic extinction

        const lp  = LP(twoTh);
        const DW  = Math.exp(-2 * Bdw * s2);  // overall DW for display
        const Iraw = sf.F2 * lp;              // |F|² × LP

        const exist = peaks.find(p => Math.abs(p.twoTheta - twoTh) < 0.01);
        if (exist) {
          exist.multiplicity++;
          exist.Iraw += Iraw;
          if (Math.abs(h)+Math.abs(k)+Math.abs(l) < Math.abs(exist.h)+Math.abs(exist.k)+Math.abs(exist.l))
            Object.assign(exist, {h,k,l});
        } else {
          peaks.push({ h, k, l, d, sinTheta:sinT, twoTheta:twoTh, s, s2,
            Fre:sf.Fre, Fim:sf.Fim, F2:sf.F2, Fmod:sf.Fmod,
            DW, lp, Iraw, multiplicity:1, atomContribs:sf.atomContribs });
        }
      }
    }
  }

  if (!peaks.length) return { peaks:[], spectrum:[], twoThetaArr:[] };

  // Compute f_avg and fwhm, relIntensity
  const maxI = Math.max(...peaks.map(p => p.Iraw));
  peaks.forEach(p => {
    p.relIntensity = (p.Iraw / maxI) * 100;
    p.fwhm = peakFWHM(p.twoTheta, D, lambda, eps);
    p.f_avg = basis.reduce((s,at) => s + atomicF(at.element, p.s2), 0) / basis.length;
    p.theta = p.twoTheta / 2;
    p.cos2t = Math.cos(p.twoTheta * Math.PI / 180);
  });
  peaks.sort((a,b) => a.twoTheta - b.twoTheta);

  // Spectrum
  const step = (max2t - min2t) / (nPts-1);
  const twoThetaArr = Array.from({length:nPts}, (_,i) => min2t + i*step);
  const spec = new Float64Array(nPts);
  for (const p of peaks) {
    const sig = p.fwhm / (2*Math.sqrt(2*Math.log(2)));
    const iS  = Math.max(0, Math.floor((p.twoTheta - 8*sig - min2t)/step));
    const iE  = Math.min(nPts-1, Math.ceil((p.twoTheta + 8*sig - min2t)/step));
    for (let i=iS; i<=iE; i++)
      spec[i] += (p.relIntensity/100) * Math.exp(-0.5*((twoThetaArr[i]-p.twoTheta)/sig)**2);
  }
  const maxSp = Math.max(...spec)||1;
  return { peaks, spectrum: Array.from(spec, v=>(v/maxSp)*100), twoThetaArr };
}

// CANVAS PLOT
// ══════════════════════════════════════════════════════════════════════════════
function XRDPlot({ data, min2t, max2t, peaks, showLabels }) {
  const ref = useRef(null);
  useEffect(() => {
    const cv = ref.current; if (!cv||!data?.length) return;
    const ctx = cv.getContext("2d");
    const W=cv.width, H=cv.height;
    const P={L:68,R:20,T:28,B:50};
    const pw=W-P.L-P.R, ph=H-P.T-P.B;
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,"#07101f"); bg.addColorStop(1,"#04080f");
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    // grid
    ctx.strokeStyle="rgba(70,110,200,0.07)"; ctx.lineWidth=1;
    for(let i=0;i<=10;i++){const y=P.T+ph*i/10;ctx.beginPath();ctx.moveTo(P.L,y);ctx.lineTo(P.L+pw,y);ctx.stroke();}
    for(let i=0;i<=8;i++){const x=P.L+pw*i/8;ctx.beginPath();ctx.moveTo(x,P.T);ctx.lineTo(x,P.T+ph);ctx.stroke();}
    // axes
    ctx.strokeStyle="rgba(120,170,255,0.4)"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(P.L,P.T); ctx.lineTo(P.L,P.T+ph); ctx.lineTo(P.L+pw,P.T+ph); ctx.stroke();
    const range=max2t-min2t;
    ctx.fillStyle="rgba(140,180,255,0.6)"; ctx.font="11px 'Courier New',monospace";
    ctx.textAlign="center";
    for(let i=0;i<=8;i++) ctx.fillText((min2t+range*i/8).toFixed(0)+"°", P.L+pw*i/8, P.T+ph+17);
    ctx.textAlign="right";
    for(let i=0;i<=5;i++) ctx.fillText(100-i*20, P.L-6, P.T+ph*i/5+4);
    ctx.save(); ctx.translate(13,P.T+ph/2); ctx.rotate(-Math.PI/2);
    ctx.textAlign="center"; ctx.fillStyle="rgba(120,175,255,0.65)";
    ctx.font="12px 'Courier New',monospace"; ctx.fillText("Intensity (%)",0,0); ctx.restore();
    ctx.textAlign="center"; ctx.fillStyle="rgba(120,175,255,0.65)";
    ctx.font="12px 'Courier New',monospace"; ctx.fillText("2θ (degrees)", P.L+pw/2, H-5);
    // area
    const xs=pw/(data.length-1);
    ctx.beginPath(); ctx.moveTo(P.L,P.T+ph);
    for(let i=0;i<data.length;i++) ctx.lineTo(P.L+i*xs, P.T+ph-(data[i]/100)*ph);
    ctx.lineTo(P.L+(data.length-1)*xs,P.T+ph); ctx.closePath();
    const fg=ctx.createLinearGradient(0,P.T,0,P.T+ph);
    fg.addColorStop(0,"rgba(70,165,255,0.28)"); fg.addColorStop(1,"rgba(15,60,180,0.03)");
    ctx.fillStyle=fg; ctx.fill();
    ctx.beginPath();
    for(let i=0;i<data.length;i++) i===0?ctx.moveTo(P.L,P.T+ph-(data[0]/100)*ph):ctx.lineTo(P.L+i*xs,P.T+ph-(data[i]/100)*ph);
    ctx.strokeStyle="rgba(85,195,255,0.9)"; ctx.lineWidth=1.5; ctx.stroke();
    // labels
    if (showLabels && peaks) {
      const top=[...peaks].sort((a,b)=>b.relIntensity-a.relIntensity).slice(0,20);
      for(const p of top){
        const xf=(p.twoTheta-min2t)/range; if(xf<0||xf>1) continue;
        const px=P.L+xf*pw, py=P.T+ph-(p.relIntensity/100)*ph;
        ctx.strokeStyle="rgba(255,210,70,0.7)"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py-9); ctx.stroke();
        ctx.save(); ctx.translate(px,py-13); ctx.rotate(-Math.PI/4);
        ctx.font="9px 'Courier New',monospace"; ctx.fillStyle="rgba(255,210,70,0.85)";
        ctx.textAlign="right"; ctx.fillText(`(${p.h}${p.k}${p.l})`,0,0); ctx.restore();
      }
    }
  }, [data, min2t, max2t, peaks, showLabels]);
  return <canvas ref={ref} width={920} height={350} style={{width:"100%",height:"auto",borderRadius:"6px"}}/>;
}

// PHYSICS TABLE
// ══════════════════════════════════════════════════════════════════════════════
function PhysicsTable({ peaks, Bdw }) {
  const [sortKey, setSortKey] = useState("twoTheta");
  const [sortDir, setSortDir] = useState(1);
  const [expanded, setExpanded] = useState(null);

  const sorted = useMemo(()=>[...peaks].sort((a,b)=>sortDir*(a[sortKey]-b[sortKey])),
    [peaks,sortKey,sortDir]);

  const doSort = k => { if(k===sortKey) setSortDir(d=>-d); else{setSortKey(k);setSortDir(1);} };

  const TH = ({children, col, tip, span}) => (
    <th colSpan={span||1} title={tip} onClick={col?()=>doSort(col):undefined}
      style={{padding:"6px 8px",textAlign:"left",fontWeight:"normal",fontSize:"10px",
        color:col&&sortKey===col?"#7acfff":"#3a8acf",letterSpacing:"0.4px",
        borderBottom:"1px solid rgba(60,120,220,0.25)",whiteSpace:"nowrap",
        cursor:col?"pointer":"default",background:"rgba(5,13,40,0.98)",
        position:"sticky",top:0,zIndex:2,fontFamily:"'Courier New',monospace"}}>
      {children}{col&&sortKey===col?(sortDir>0?"▲":"▼"):""}
    </th>
  );

  const TD = ({children,bright,warn,center,dim}) => (
    <td style={{padding:"5px 8px",fontSize:"10px",fontFamily:"'Courier New',monospace",
      borderBottom:"1px solid rgba(30,60,130,0.1)",
      textAlign:center?"center":"left",
      color:warn?"#ff8866":bright?"#66ddff":dim?"#3a6a8a":"#7aacc8"}}>
      {children}
    </td>
  );

  return (
    <div style={{overflowX:"auto",maxHeight:"500px",overflowY:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"10px"}}>
        <thead>
          <tr>
            <TH tip="Click row to expand per-atom detail">(hkl)</TH>
            <TH col="d"          tip="晶面間距 d (Å)  —  2d sinθ = λ">d (Å)</TH>
            <TH col="sinTheta"   tip="sinθ = λ / 2d">sinθ</TH>
            <TH col="theta"      tip="θ (半繞射角, °)">θ (°)</TH>
            <TH col="twoTheta"   tip="2θ 繞射角 (°)">2θ (°)</TH>
            <TH col="s"          tip="s = sinθ/λ  (Å⁻¹)  — 散射向量長度">s (Å⁻¹)</TH>
            <TH col="f_avg"      tip="平均原子散射因子 f̄(s) = Σ aᵢ e^{-bᵢs²} + c">f̄(s)</TH>
            <TH col="Fre"        tip="Structure Factor 實部  Re[F(hkl)]">Re(F)</TH>
            <TH col="Fim"        tip="Structure Factor 虛部  Im[F(hkl)]">Im(F)</TH>
            <TH col="Fmod"       tip="|F| = √(Re²+Im²)">|F|</TH>
            <TH col="F2"         tip="|F|² = Re²+Im²  —  正比於散射強度">|F|²</TH>
            <TH col="DW"         tip="Debye-Waller 衰減  e^{-2Bs²}  B=%  整體">DW</TH>
            <TH col="lp"         tip="Lorentz-Polarization  (1+cos²2θ)/(sin²θ·cosθ)">LP</TH>
            <TH col="cos2t"      tip="cos²(2θ)  — 偏振修正項">cos²2θ</TH>
            <TH col="Iraw"       tip="I_raw = |F|² × LP  (未正規化)">I_raw</TH>
            <TH col="relIntensity" tip="I_rel = I_raw / max × 100  (%)">I_rel (%)</TH>
            <TH col="fwhm"       tip="FWHM = √(β²_Scherrer + β²_strain) (°)">FWHM (°)</TH>
            <TH col="multiplicity" tip="等效晶面多重性">m</TH>
          </tr>
        </thead>
        <tbody>
          {sorted.map((p,i) => {
            const open = expanded===i;
            return [
              <tr key={`r${i}`} onClick={()=>setExpanded(open?null:i)}
                style={{background:i%2===0?"rgba(8,18,50,0.35)":"transparent",
                  cursor:"pointer",
                  borderLeft:open?"3px solid #4af":"3px solid transparent",
                  transition:"background 0.1s"}}>
                <TD bright>{`(${p.h}${p.k}${p.l})`}</TD>
                <TD>{p.d.toFixed(4)}</TD>
                <TD>{p.sinTheta.toFixed(5)}</TD>
                <TD>{p.theta.toFixed(3)}</TD>
                <TD bright>{p.twoTheta.toFixed(3)}</TD>
                <TD>{p.s.toFixed(5)}</TD>
                <TD>{p.f_avg.toFixed(3)}</TD>
                <TD>{p.Fre.toFixed(3)}</TD>
                <TD>{p.Fim.toFixed(3)}</TD>
                <TD>{p.Fmod.toFixed(3)}</TD>
                <TD bright>{p.F2.toFixed(2)}</TD>
                <TD warn={p.DW<0.4}>{p.DW.toFixed(4)}</TD>
                <TD>{p.lp.toFixed(4)}</TD>
                <TD dim>{p.cos2t.toFixed(4)}</TD>
                <TD>{p.Iraw.toFixed(2)}</TD>
                <td style={{padding:"5px 8px",fontFamily:"'Courier New',monospace",borderBottom:"1px solid rgba(30,60,130,0.1)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                    <div style={{width:`${Math.max(2,p.relIntensity*0.65)}px`,height:"7px",flexShrink:0,
                      background:`hsl(${195+p.relIntensity*0.4},80%,52%)`,borderRadius:"2px"}}/>
                    <span style={{fontSize:"10px",color:p.relIntensity>60?"#66ffee":p.relIntensity>20?"#88ccee":"#4a7a99"}}>
                      {p.relIntensity.toFixed(1)}
                    </span>
                  </div>
                </td>
                <TD warn={p.fwhm>0.5}>{p.fwhm.toFixed(4)}</TD>
                <TD center dim>{p.multiplicity}</TD>
              </tr>,
              open && <tr key={`e${i}`}><td colSpan={18} style={{padding:0}}>
                <AtomBreakdown peak={p} Bdw={Bdw}/>
              </td></tr>
            ];
          })}
        </tbody>
      </table>
    </div>
  );
}

            ].map(([lbl,v,set,mn,mx,step,note])=>(
              <div key={lbl} style={{marginBottom:"8px"}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={L}>{lbl}</span><span style={V}>{typeof v==="number"&&v<0.001?v.toFixed(4):v}</span>
                </div>
                <input type="range" min={mn} max={mx} step={step} value={v}
                  onChange={e=>set(parseFloat(e.target.value))} style={{...slH,marginTop:"3px"}}/>
                {note&&<div style={{marginTop:"1px"}}>{note}</div>}
              </div>
            ))}
          </div>

          <div style={PNL}>
            <div style={SH}>▸ BASIS ATOMS</div>
            <div style={{maxHeight:"140px",overflowY:"auto"}}>
              {st.getBasis().map((at,i)=>(
                <div key={i} style={{display:"flex",gap:"4px",padding:"2px 5px",marginBottom:"2px",
                  background:"rgba(12,28,70,0.4)",borderRadius:"3px",fontSize:"9px",color:"#5a8aaa"}}>
                  <span style={{color:"#ffcc44",width:"20px",flexShrink:0}}>{at.element}</span>
                  <span>({at.x.toFixed(3)},{at.y.toFixed(3)},{at.z.toFixed(3)})</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* MAIN */}
        <div style={{flex:1,padding:"16px",overflowY:"auto"}}>
          {/* Tabs */}
          <div style={{display:"flex",gap:"1px",marginBottom:"12px",
            borderBottom:"1px solid rgba(60,120,220,0.1)"}}>
            {[["plot","📈 XRD 圖譜 + 物理表格"],["info","ℹ 公式說明"]].map(([id,lbl])=>(
              <button key={id} onClick={()=>setTab(id)} style={{
                background:tab===id?"rgba(20,60,160,0.4)":"transparent",
                border:"none",borderBottom:tab===id?"2px solid #4af":"2px solid transparent",
                color:tab===id?"#66ccff":"#3a6a8a",padding:"6px 14px",cursor:"pointer",...MN,fontSize:"10px",
              }}>{lbl}</button>
            ))}
            <div style={{marginLeft:"auto",display:"flex",gap:"7px",alignItems:"center"}}>
              <label style={{...L,display:"flex",alignItems:"center",gap:"4px",cursor:"pointer"}}>
                <input type="checkbox" checked={showLabels} onChange={e=>setShowLabels(e.target.checked)}/> (hkl)標示
              </label>
              {csvHref&&<a href={csvHref} download="xrd_physics.csv" style={{
                background:"rgba(10,45,130,0.7)",border:"1px solid rgba(60,120,240,0.25)",
                borderRadius:"4px",padding:"4px 10px",color:"#66ccff",fontSize:"9px",textDecoration:"none",
              }}>⬇ CSV</a>}
            </div>
          </div>

          {tab==="plot" && <>
            {/* PLOT */}
            <div style={{background:"rgba(3,8,24,0.9)",borderRadius:"8px",
              border:"1px solid rgba(60,120,220,0.1)",padding:"10px",marginBottom:"12px"}}>
              {result.spectrum.length>0
                ? <XRDPlot data={result.spectrum} min2t={min2t} max2t={max2t} peaks={result.peaks} showLabels={showLabels}/>
                : <div style={{textAlign:"center",color:"#1a3a6a",padding:"60px",fontSize:"11px"}}>
                    No peaks in this range. Adjust 2θ or max hkl.
                  </div>}
            </div>

            {/* Stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"7px",marginBottom:"14px"}}>
              {[
                ["Peaks",result.peaks.length,"reflections"],
                ["λ",lambda,"Å"],
                ["d range",result.peaks.length>0?`${Math.min(...result.peaks.map(p=>p.d)).toFixed(2)}–${Math.max(...result.peaks.map(p=>p.d)).toFixed(2)}`:"–","Å"],
                ["Grain D",D,"nm"],
                ["Strain ε",eps.toFixed(4),""],
                ["B_DW",Bdw,"Å²"],
              ].map(([l2,v2,u])=>(
                <div key={l2} style={{background:"rgba(6,14,42,0.7)",border:"1px solid rgba(50,110,200,0.1)",
                  borderRadius:"6px",padding:"8px",textAlign:"center"}}>
                  <div style={{color:"#1a4a70",fontSize:"8px",marginBottom:"2px",letterSpacing:"0.8px"}}>{l2}</div>
                  <div style={{color:"#44bbff",fontSize:"14px",fontWeight:"bold",...MN}}>{v2}</div>
                  <div style={{color:"#1a4a70",fontSize:"8px"}}>{u}</div>
                </div>
              ))}
            </div>

            {/* PHYSICS TABLE */}
            <div style={{background:"rgba(3,8,24,0.92)",borderRadius:"8px",
              border:"1px solid rgba(60,120,220,0.15)",overflow:"hidden"}}>
              <div style={{padding:"9px 14px",borderBottom:"1px solid rgba(60,120,220,0.15)",
                display:"flex",alignItems:"center",gap:"16px",flexWrap:"wrap"}}>
                <div>
                  <span style={{color:"#44aaff",fontSize:"10px",letterSpacing:"1.5px",fontWeight:"bold",...MN}}>
                    DIFFRACTION PHYSICS TABLE
                  </span>
                  <span style={{color:"#1a4a70",fontSize:"9px",marginLeft:"10px",...MN}}>
                    點擊任一列 → 展開逐原子 F(hkl) 計算細節
                  </span>
                </div>
                <div style={{display:"flex",gap:"12px",fontSize:"8px",color:"#1a4a70",...MN,flexWrap:"wrap"}}>
                  {[["sinθ","λ/2d"],["s","sinθ/λ Å⁻¹"],["f̄","avg atomic f"],
                    ["|F|²","struct. factor"],["DW","e^{-2Bs²}"],["LP","Lorentz-Pol."],
                    ["I_raw","|F|²·LP"],["I_rel","norm. %"]].map(([k,v])=>(
                    <span key={k}><span style={{color:"#3a8aaa"}}>{k}</span>=<span style={{color:"#1a5a7a"}}>{v}</span></span>
                  ))}
                </div>
              </div>
              {result.peaks.length>0
                ? <PhysicsTable peaks={result.peaks} Bdw={Bdw}/>
                : <div style={{textAlign:"center",color:"#1a3a60",padding:"25px",fontSize:"10px"}}>No peaks.</div>
              }
            </div>
          </>}

          {tab==="info" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
              {[
                {n:"① d-spacing",  eq:"1/d² = (h²+k²+l²)/a²  [cubic]\n1/d² = 4/3·(h²+hk+k²)/a² + l²/c²  [hex]\n…各晶系專屬公式", desc:"晶格常數決定 d，d 大→低角峰（靠左）。Bragg law：2d sinθ = λ。"},
                {n:"② sinθ & s",   eq:"sinθ = λ/2d\ns = sinθ/λ  (Å⁻¹)  散射向量長度", desc:"s 是散射向量的無量綱化長度，不依賴 λ。高角峰的 s 大，所有角度相關衰減都以 s² 表示。"},
                {n:"③ Atomic f(s)",eq:"f(s) = Σᵢ aᵢ exp(−bᵢ s²) + c\n（4-Gaussian 近似，25種元素）", desc:"Z 越大 f 越大（重元素散射強）。高角度 s 大→ f 衰減（電子雲有限尺寸）。"},
                {n:"④ Structure Factor F",eq:"F(hkl) = Σⱼ fⱼ·DWⱼ·exp[2πi(hxⱼ+kyⱼ+lzⱼ)]\nRe = Σ fⱼ cosφⱼ\nIm = Σ fⱼ sinφⱼ", desc:"複數疊加，相位φ=2π(hx+ky+lz)。展開每行可看到各原子的 Re/Im 貢獻及如何干涉。F=0→消峰。"},
                {n:"⑤ Systematic Extinction",eq:"BCC: h+k+l = 奇數 → F ≈ 0\nFCC: h,k,l 非全奇或全偶 → F ≈ 0\nDiamond: 附加條件 h+k+l ≠ 4n+2", desc:"由結構因子計算自動給出，程式不用手動規則。消峰就是結構對稱性造成干涉相消。"},
                {n:"⑥ Debye-Waller",eq:"DW = exp(−2B·s²)\nfeff = f·DW\ns = sinθ/λ", desc:"B 是各向同性熱位移因子（Å²）。高角度 s 大→ DW 小→強度衰減加速。B=0 時無衰減。"},
                {n:"⑦ Lorentz-Polarization",eq:"LP = (1 + cos²2θ) / (sin²θ · cosθ)", desc:"幾何（Lorentz）＋非偏振光偏振（Polarization）的合併修正。低角度 LP 大，高角度峰被壓低。"},
                {n:"⑧ Intensity & FWHM",eq:"I_raw = |F|² × LP\nI_rel = I_raw / max × 100 (%)\nβ = √[(Kλ/D cosθ)² + (4ε tanθ)²]", desc:"最終強度含多重性、DW、LP。FWHM 由 Scherrer（尺寸）和 Williamson-Hall（應變）合成，D↓→峰寬↑。"},
              ].map(({n,eq,desc})=>(
                <div key={n} style={{background:"rgba(5,12,38,0.88)",border:"1px solid rgba(50,110,210,0.11)",
                  borderRadius:"6px",padding:"11px"}}>
                  <div style={{color:"#3a99dd",fontSize:"9px",fontWeight:"bold",marginBottom:"6px",letterSpacing:"0.5px",...MN}}>{n}</div>
                  <div style={{background:"rgba(12,35,100,0.4)",borderRadius:"3px",padding:"5px 8px",marginBottom:"6px",
                    color:"#ffcc66",fontSize:"10px",whiteSpace:"pre-line",...MN}}>{eq}</div>
                  <div style={{color:"#4a7a9a",lineHeight:"1.7",fontSize:"9px"}}>{desc}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<XRDSimulator />);
  </script>
</body>
</html>
